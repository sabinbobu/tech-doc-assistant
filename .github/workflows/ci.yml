# CI/CD Pipeline for Technical Documentation Assistant
#
# WHY THIS MATTERS:
# BMW requires CI/CD experience. This runs automatically on every push:
# 1. Lints your code (catches style issues)
# 2. Type-checks your code (catches type errors)
# 3. Runs all tests (catches logic errors)
#
# Think of it as an automated code review + regression test suite
# that runs before any code reaches the main branch.
# Like having an automated MISRA check on every commit.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type check with MyPy
        run: mypy src/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=term-missing
